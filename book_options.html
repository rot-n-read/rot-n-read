<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1E1B2E">
  <meta name="description" content="Brainrot your way through books">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Book Options — Rot n Read</title>
  <link rel="icon" href="images/alt-logo/logo.alt.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="images/logo/icon-192x192.png">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <img src="images/logo/watermark.svg" alt="" class="watermark">

    <header class="header">
      <a href="home.html" class="header__back-link">
        <img src="images/icons/back.svg" alt="Back" class="header__back-icon">
      </a>
      <h1 class="header__title">Book Options</h1>
    </header>

    <main class="main book-options">
      <section class="book-options__preview">
        <div class="book-options__tile" id="preview-tile">
          <span class="book-options__tile-initials" id="preview-initials">AB</span>
        </div>
      </section>

      <section class="book-options__section">
        <div class="settings__group">
          <label class="settings__label">Title</label>
          <input type="text" class="book-options__input" id="book-title-input" placeholder="Book title">
        </div>

        <div class="settings__group">
          <label class="settings__label">Cover Initials</label>
          <input type="text" class="book-options__input" id="book-initials-input" placeholder="e.g. ABCD" maxlength="4">
        </div>

        <div class="settings__group">
          <label class="settings__label">Tile Color</label>
          <div class="book-options__colors" id="color-picker">
            <button class="book-options__color-btn" data-color="#3d375799" style="background:#3d375799"></button>
            <button class="book-options__color-btn" data-color="#332d4a99" style="background:#332d4a99"></button>
            <button class="book-options__color-btn" data-color="#4b3a6b99" style="background:#4b3a6b99"></button>
            <button class="book-options__color-btn" data-color="#2d284599" style="background:#2d284599"></button>
            <button class="book-options__color-btn" data-color="#3a2f5599" style="background:#3a2f5599"></button>
            <button class="book-options__color-btn" data-color="#45366099" style="background:#45366099"></button>
            <button class="book-options__color-btn" data-color="#2f264099" style="background:#2f264099"></button>
            <button class="book-options__color-btn" data-color="#52407a99" style="background:#52407a99"></button>
          </div>
        </div>

        <div class="settings__group">
          <label class="settings__label">Skip Characters</label>
          <input type="text" class="book-options__input" id="skip-chars-input" placeholder="e.g. ☆※~">
          <span class="settings__hint">Any characters entered here will be stripped from the text</span>
        </div>

        <div class="settings__group" id="progress-group">
          <label class="settings__label">Progress</label>
          <div class="book-options__progress-preview" id="progress-preview"></div>
          <input type="range" class="book-options__progress-slider" id="progress-slider" min="0" max="100" value="0" step="1">
          <div class="book-options__progress-meta">
            <span id="progress-label-from">0%</span>
            <span id="progress-label-total"></span>
          </div>
        </div>

        <div class="settings__group">
          <label class="settings__label">Storage</label>
          <div class="book-options__storage" id="storage-info">
            <span class="book-options__storage-badge" id="storage-badge">IndexedDB</span>
            <span class="book-options__storage-size" id="storage-size"></span>
          </div>
        </div>
      </section>

      <section class="book-options__actions">
        <button class="book-options__save-btn" id="save-btn">Save Changes</button>
        <button class="book-options__delete-btn" id="delete-btn">Delete Book</button>
      </section>
    </main>

    <div class="book-options__modal hidden" id="progress-modal">
      <div class="book-options__modal-content">
        <p class="book-options__modal-text" id="progress-modal-text">Change progress?</p>
        <div class="book-options__modal-actions">
          <button class="book-options__modal-btn book-options__modal-btn--cancel" id="progress-modal-cancel">Cancel</button>
          <button class="book-options__modal-btn book-options__modal-btn--confirm book-options__modal-btn--progress" id="progress-modal-confirm">Confirm</button>
        </div>
      </div>
    </div>

    <div class="book-options__modal hidden" id="delete-modal">
      <div class="book-options__modal-content">
        <p class="book-options__modal-text">Are you sure you want to delete this book? This cannot be undone.</p>
        <div class="book-options__modal-actions">
          <button class="book-options__modal-btn book-options__modal-btn--cancel" id="modal-cancel">Cancel</button>
          <button class="book-options__modal-btn book-options__modal-btn--confirm" id="modal-confirm">Delete</button>
        </div>
      </div>
    </div>

  </div>

  <script src="js/app.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/book_options.js"></script>
</body>
</html>
