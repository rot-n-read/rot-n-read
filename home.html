<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1E1B2E">
  <meta name="description" content="Brainrot your way through books">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Rot n Read</title>
  <link rel="icon" href="images/alt-logo/logo.alt.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="images/logo/icon-192x192.png">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <img src="images/logo/watermark.svg" alt="" class="watermark">

    <header class="header">
      <h1 class="header__title">Rot n Read</h1>
    </header>

    <main class="main">
      <div class="book-grid" id="book-grid"></div>
    </main>

    <div class="loading-overlay hidden" id="loading-overlay">
      <div class="loading-spinner"></div>
      <p class="loading-text">Parsing PDF…</p>
    </div>

    <div class="bottom-nav__fade"></div>
    <nav class="bottom-nav">
      <a href="about.html" class="bottom-nav__item bottom-nav__item--side">
        <img src="images/icons/info.svg" alt="About" class="bottom-nav__icon">
      </a>
      <a href="javascript:void(0)" class="bottom-nav__item bottom-nav__item--center bottom-nav__item--active" id="add-book-btn">
        <img src="images/icons/add.svg" alt="Home" class="bottom-nav__icon bottom-nav__icon--center">
      </a>
      <a href="settings.html" class="bottom-nav__item bottom-nav__item--side">
        <img src="images/icons/settings.svg" alt="Settings" class="bottom-nav__icon">
      </a>
    </nav>
  </div>

  <script src="js/app.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/pdf_handler.js"></script>
  <script src="js/home.js"></script>
</body>
</html>
